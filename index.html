<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1208">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StopWork">
  <meta name="description" content="교통 대기 시간에 작업하기 좋은 주변 카페를 즉시 찾아드립니다">
  <title>StopWork | 교통 대기 시간 카페 찾기</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  카카오 JavaScript API 키 설정 방법                       ║
    ║  1. https://developers.kakao.com 접속 후 앱 생성          ║
    ║  2. [앱 키] → [JavaScript 키] 복사                        ║
    ║  3. 아래 YOUR_KAKAO_JS_KEY 를 복사한 키로 교체            ║
    ╚══════════════════════════════════════════════════════════╝
  -->
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=27ae646f3837556478e5a00fa1a97efa&libraries=services">
  </script>
</head>
<body>
<div id="app">

  <!-- ── 상단 헤더 ── -->
  <header class="app-header">
    <div class="header-left">
      <i class="fa-solid fa-mug-hot header-icon"></i>
      <span class="header-title">StopWork</span>
    </div>
    <div class="header-right">
      <button id="btn-locate" class="icon-btn" title="현재 위치로 이동">
        <i class="fa-solid fa-crosshairs"></i>
      </button>
      <button id="btn-filter-toggle" class="icon-btn" title="검색 및 필터">
        <i class="fa-solid fa-sliders"></i>
      </button>
    </div>
  </header>

  <!-- ── 검색/필터 패널 (헤더 아래 슬라이드) ── -->
  <div id="filter-panel" class="filter-panel">
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass search-icon"></i>
      <input type="text" id="search-input" placeholder="카페 이름 검색...">
      <button id="btn-clear-search" class="clear-btn" style="display:none">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="filter-row">
      <button class="chip" data-filter="wifi">
        <i class="fa-solid fa-wifi"></i> Wi-Fi
      </button>
      <button class="chip" data-filter="outlet">
        <i class="fa-solid fa-plug"></i> 콘센트
      </button>
      <button class="chip" data-filter="open">
        <i class="fa-solid fa-clock"></i> 영업 중
      </button>
    </div>
    <div class="sort-row">
      <span class="sort-label">정렬</span>
      <select id="sort-select">
        <option value="distance">가까운 순</option>
        <option value="score">작업 점수 순</option>
      </select>
    </div>
  </div>

  <!-- ── 지도 ── -->
  <div id="map"></div>

  <!-- ── 바텀 시트 ── -->
  <div id="bottom-sheet" class="bottom-sheet mid">
    <div id="sheet-handle-area" class="sheet-handle-area">
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-header">
      <span id="cafe-count-text">주변 카페 찾는 중...</span>
      <button id="btn-add-cafe" class="btn-add-cafe">
        <i class="fa-solid fa-plus"></i> 직접 등록
      </button>
    </div>
    <div id="cafe-list" class="cafe-list">
      <div class="list-loading">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        <p>위치를 확인하는 중입니다...</p>
      </div>
    </div>
  </div>

  <!-- ── 카페 상세 패널 (아래서 슬라이드 업) ── -->
  <div id="detail-panel" class="detail-panel">
    <div class="detail-topbar">
      <button id="btn-close-detail" class="icon-btn">
        <i class="fa-solid fa-chevron-down"></i>
      </button>
      <span id="detail-panel-title" class="detail-topbar-title"></span>
      <button id="btn-favorite" class="icon-btn">
        <i class="fa-regular fa-bookmark"></i>
      </button>
    </div>
    <div id="detail-scroll" class="detail-scroll">
      <!-- JS로 채움 -->
    </div>
  </div>

  <!-- ── 하단 네비게이션 ── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-nav="home">
      <i class="fa-solid fa-house"></i>
      <span>홈</span>
    </button>
    <button class="nav-btn" data-nav="favorites">
      <i class="fa-solid fa-bookmark"></i>
      <span>즐겨찾기</span>
    </button>
    <button class="nav-btn" data-nav="history">
      <i class="fa-solid fa-clock-rotate-left"></i>
      <span>방문기록</span>
    </button>
  </nav>

  <!-- ── 즐겨찾기 패널 ── -->
  <div id="favorites-panel" class="side-panel">
    <div class="side-panel-header">
      <h2>즐겨찾기</h2>
      <button class="icon-btn side-panel-close" data-panel="favorites-panel">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div id="favorites-list" class="side-panel-body"></div>
  </div>

  <!-- ── 방문기록 패널 ── -->
  <div id="history-panel" class="side-panel">
    <div class="side-panel-header">
      <h2>방문 기록</h2>
      <button class="icon-btn side-panel-close" data-panel="history-panel">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div id="history-list" class="side-panel-body"></div>
  </div>

  <!-- ── 카페 직접 등록 모달 ── -->
  <div id="modal-add" class="modal">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <h3><i class="fa-solid fa-mug-hot"></i> 카페 직접 등록</h3>
        <button id="btn-close-modal" class="icon-btn">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <form id="add-cafe-form" class="modal-body">
        <div class="form-group">
          <label>카페 이름 *</label>
          <input type="text" id="fc-name" required placeholder="예: 블루보틀 역삼점">
        </div>
        <div class="form-group">
          <label>주소</label>
          <input type="text" id="fc-addr" placeholder="예: 서울 강남구 테헤란로 123">
        </div>
        <div class="form-grid-3">
          <div class="form-group">
            <label>콘센트</label>
            <select id="fc-outlet">
              <option value="5">충분</option>
              <option value="3" selected>보통</option>
              <option value="1">희박</option>
            </select>
          </div>
          <div class="form-group">
            <label>Wi-Fi</label>
            <select id="fc-wifi">
              <option value="5">빠름</option>
              <option value="3" selected>보통</option>
              <option value="1">느림</option>
            </select>
          </div>
          <div class="form-group">
            <label>소음</label>
            <select id="fc-noise">
              <option value="5">조용</option>
              <option value="3" selected>보통</option>
              <option value="1">시끄럽</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>영업시간</label>
          <input type="text" id="fc-hours" placeholder="예: 08:00 - 22:00">
        </div>
        <div class="form-group">
          <label>한줄 팁</label>
          <textarea id="fc-tip" rows="2" placeholder="작업하기 좋은 포인트를 알려주세요"></textarea>
        </div>
        <button type="submit" class="btn-submit">등록하기</button>
      </form>
    </div>
  </div>

  <!-- ── 토스트 ── -->
  <div id="toast" class="toast"></div>

</div><!-- /#app -->

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
